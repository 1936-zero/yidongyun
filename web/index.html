<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>移动云电脑保活控制台</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>移动云电脑保活控制台</h1>
      <p id="runtimeSummary">读取运行状态中</p>
    </div>
    <button id="refreshBtn" type="button">刷新</button>
  </header>

  <main class="layout">
    <section class="panel status-panel">
      <div class="section-title">
        <h2>状态</h2>
        <span id="loginBadge" class="badge">未知</span>
      </div>
      <dl class="status-grid">
        <div><dt>手机号</dt><dd id="statePhone">-</dd></div>
        <div><dt>用户 ID</dt><dd id="stateUser">-</dd></div>
        <div><dt>持续保活</dt><dd id="schedulerActive">-</dd></div>
        <div><dt>当前轮</dt><dd id="runActive">-</dd></div>
        <div><dt>下次调度</dt><dd id="nextRun">-</dd></div>
        <div><dt>成功次数</dt><dd id="successCount">-</dd></div>
        <div><dt>连续失败</dt><dd id="failureCount">-</dd></div>
        <div><dt>最近失败</dt><dd id="lastFailure">-</dd></div>
      </dl>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>登录</h2>
      </div>
      <div class="form-row">
        <label>
          手机号
          <input id="phoneInput" inputmode="numeric" autocomplete="tel" placeholder="手机号">
        </label>
        <button id="sendSmsBtn" type="button">发送验证码</button>
      </div>
      <div class="form-row">
        <label>
          验证码
          <input id="codeInput" inputmode="numeric" autocomplete="one-time-code" placeholder="短信验证码">
        </label>
        <button id="loginBtn" type="button">短信登录</button>
      </div>
    </section>

    <section class="panel wide">
      <div class="section-title">
        <h2>云电脑</h2>
        <button id="listBtn" type="button">读取列表</button>
      </div>
      <div id="cloudList" class="table-empty">尚未读取列表</div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>保活控制</h2>
      </div>
      <label>
        userServiceId
        <input id="userServiceIdInput" placeholder="例如 2663816">
      </label>
      <div class="split">
        <label>
          保持秒数
          <input id="durationInput" type="number" min="5" step="1" value="120">
        </label>
        <label>
          列表序号
          <input id="indexInput" type="number" min="0" step="1" value="0">
        </label>
      </div>
      <div class="split">
        <label>
          间隔分钟
          <input id="intervalInput" type="number" min="1" step="1" value="10">
        </label>
      </div>
      <div class="button-row">
        <button id="startSchedulerBtn" type="button" class="primary">开始持续保活</button>
        <button id="stopSchedulerBtn" type="button" class="danger">停止持续保活</button>
        <button id="keepaliveBtn" type="button">运行一次</button>
      </div>
    </section>

    <section class="panel wide">
      <div class="section-title">
        <h2>连接判定</h2>
        <span id="signalVerdict" class="verdict unknown">未验证</span>
      </div>
      <div id="successSummary" class="success-summary">尚无持续保活成功记录</div>
      <p id="signalReason" class="signal-reason">等待日志分析</p>
      <div id="signalChecks" class="signal-checks"></div>
    </section>

    <section class="panel wide logs-panel">
      <div class="section-title">
        <h2>日志</h2>
        <button id="refreshLogsBtn" type="button">刷新日志</button>
      </div>
      <pre id="logOutput">等待日志</pre>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
